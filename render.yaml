# Render Blueprint — deploys ForgeTeam as a free Node web service.
# Runs from source (no Docker). Docs: https://render.com/docs/blueprint-spec
# Note: the free plan has an ephemeral disk, so the SQLite file resets on each
# deploy/restart. See docs/deploy.md for persistence options.
services:
  - type: web
    name: forgeteam
    env: node
    plan: free
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: DATABASE_URL
        value: file:./prod.db
      - key: NODE_VERSION
        value: "22"
